name: Blinkit Data Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours — one snapshot per run
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords (comma-separated)'
        default: 'chips,protein powder,cold coffee,biscuits,energy drink,namkeen'
      location:
        description: 'Location'
        default: 'mumbai'
      categories:
        description: 'Category IDs (comma-separated)'
        default: '3,4,7,8'

env:
  KEYWORDS: ${{ github.event.inputs.keywords || 'chips,protein powder,cold coffee,biscuits,energy drink,namkeen' }}
  LOCATION: ${{ github.event.inputs.location || 'mumbai' }}
  CATEGORIES: ${{ github.event.inputs.categories || '3,4,7,8' }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-blinkit-v1

      - name: Install dependencies
        run: pip install curl_cffi

      - name: Run sales estimator (single snapshot)
        working-directory: blinkit
        run: |
          python blinkit_sales_estimator.py \
            --keywords "${{ env.KEYWORDS }}" \
            --location "${{ env.LOCATION }}"

      - name: Run keyword SOV tracker
        working-directory: blinkit
        run: |
          python blinkit_keyword_tracker.py \
            --keywords "${{ env.KEYWORDS }}" \
            --pages 3 \
            --once

      - name: Run category scraper
        working-directory: blinkit
        run: |
          python blinkit_category_scraper.py \
            --categories "${{ env.CATEGORIES }}" \
            --location "${{ env.LOCATION }}"

      - name: Run price tracker
        working-directory: blinkit
        run: |
          python blinkit_price_tracker.py \
            --keyword "${{ env.KEYWORDS }}" \
            --location "${{ env.LOCATION }}" \
            --alert-threshold 2 || true

      - name: Move outputs to data/
        run: |
          mkdir -p data
          for f in blinkit/*.csv blinkit/*.json; do
            [ -f "$f" ] && cp "$f" data/ && echo "copied $f"
          done

      - name: Commit data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: snapshot $(date -u '+%Y-%m-%d %H:%M UTC') [${{ env.LOCATION }}]"
          git push

  migrate_to_db:
    runs-on: ubuntu-latest
    needs: snapshot
    # Only run on Sunday at midnight — weekly DB migration
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 0 * * 0')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DB dependencies
        run: pip install supabase pandas

      - name: Migrate data older than 3 days to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python blinkit/db_migrator.py --older-than-days 3 --data-dir data/

      - name: Commit after migration (cleanup archived rows)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: archived data older than 3 days to Supabase"
          git push
