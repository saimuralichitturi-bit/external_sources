name: Daily Market Intelligence Pipeline

on:
  schedule:
    - cron: '30 0 * * *'   # 6 AM IST daily
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      R2_WORKER_URL: ${{ secrets.R2_WORKER_URL }}
      R2_API_KEY: ${{ secrets.R2_API_KEY }}

    steps:
      - name: SSH into Oracle VM and run all pipelines
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 110m
          envs: R2_WORKER_URL,R2_API_KEY
          script: |
            cd /home/ubuntu/external_sources

            # Pull latest code from GitHub
            git pull origin main

            # Install/update dependencies
            pip3 install -r requirements.txt --user --quiet

            # Blinkit — all categories across all locations
            for loc in vijayawada mumbai bangalore delhi hyderabad chennai pune; do
              python3 blinkit/blinkit_category_scraper.py --all --location "$loc" &
            done

            # Myntra — all predefined fashion categories
            python3 myntra/myntra_sales_estimator.py \
              --all-categories --out-dir data &

            # Amazon — all predefined categories
            python3 amazon/amazon_scraper.py --all-categories --out-dir data &

            # Flipkart — all predefined categories
            python3 flipkart/flipkart_scraper.py --all-categories --out-dir data &

            # Wait for all background jobs to finish
            wait

            # Upload to Cloudflare R2
            python3 pipeline/r2_sync.py --upload --data-dir data

            echo "✅ All pipelines done"